
<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Issue Tracker Dashboard</title>
    <script src='https://cdn.plot.ly/plotly-2.24.1.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        .chart-container { min-height: 600px; }
        .dimmed { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body class='bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200'>
    <div class='max-w-7xl mx-auto px-4 py-8'>
        <header class='mb-8'>
            <h1 class='text-4xl font-extrabold text-indigo-600 dark:text-indigo-400'>Issue Tracker Dashboard</h1>
            <p class='text-gray-600 dark:text-gray-400'>Interactive visualization of Discord bug and feature trends</p>
        </header>

        <div class='grid grid-cols-1 md:grid-cols-4 gap-6 mb-8'>
            <div class='bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700'>
                <label class='block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2'>Channel</label>
                <select id='channelSelect' class='w-full border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100'>
                    <option value='bugs'>Bugs</option>
                    <option value='features'>Features</option>
                </select>
            </div>
            
            <div class='bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700'>
                <label class='block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2'>View Mode</label>
                <select id='modeSelect' class='w-full border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100'>
                    <option value='status'>Active Status (Open/Pending)</option>
                    <option value='tags'>Top Tags (Stacked)</option>
                    <option value='total'>Total Issues</option>
                </select>
            </div>

             <div id='tagsContainer' class='bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 md:col-span-2 transition-opacity duration-300'>
                <div class='flex justify-between items-center mb-2'>
                    <label class='block text-sm font-semibold text-gray-700 dark:text-gray-300'>Tags Filter (for Tag Mode)</label>
                    <button id='resetTagsBtn' class='text-xs text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 font-medium'>Reset to Default</button>
                </div>
                <div id='tagFilters' class='flex flex-wrap gap-2 max-h-24 overflow-y-auto p-2 border border-gray-200 dark:border-gray-600 rounded'>
                    <!-- Dynamic checkboxes -->
                </div>
            </div>
        </div>

        <div class='bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700'>
            <div id='chart' class='chart-container'></div>
        </div>
    </div>

    <script>
        let data = [];
        const channelSelect = document.getElementById("channelSelect");
        const modeSelect = document.getElementById('modeSelect');
        const tagsContainer = document.getElementById('tagsContainer');
        const tagFilters = document.getElementById('tagFilters');
        const resetTagsBtn = document.getElementById('resetTagsBtn');

        function isDarkMode() {
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        function updateUrl() {
            const params = new URLSearchParams();
            params.set('channel', channelSelect.value);
            params.set('mode', modeSelect.value);
            
            if (modeSelect.value === 'tags') {
                const selectedTags = Array.from(tagFilters.querySelectorAll('input:checked')).map(cb => cb.value);
                params.set('tags', selectedTags.join(','));
            }
            
            const newUrl = window.location.pathname + '?' + params.toString();
            window.history.replaceState({}, '', newUrl);
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('channel')) channelSelect.value = params.get('channel');
            if (params.has('mode')) modeSelect.value = params.get('mode');
            return params.get('tags')?.split(',') || null;
        }

        function getTop10Tags(channel) {
            const latestTags = data[data.length - 1].channels[channel].tags;
            return Object.entries(latestTags)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(e => e[0]);
        }

        function updateChart(forceTags = null) {
            const channel = channelSelect.value;
            const mode = modeSelect.value;
            const dark = isDarkMode();
            
            if (mode === 'tags') {
                tagsContainer.classList.remove('dimmed');
            } else {
                tagsContainer.classList.add('dimmed');
            }

            const dates = data.map(d => d.date);
            let traces = [];

            if (mode === 'total') {
                traces.push({
                    x: dates,
                    y: data.map(d => d.channels[channel].total),
                    type: 'scatter',
                    mode: 'lines',
                    fill: 'tozeroy',
                    name: 'Total Issues',
                    line: { color: dark ? '#818cf8' : '#6366f1' }
                });
            } else if (mode === 'status') {
                const statuses = ['open', 'pending'];
                statuses.forEach(status => {
                    traces.push({
                        x: dates,
                        y: data.map(d => (d.channels[channel].status[status] || 0)),
                        name: status.charAt(0).toUpperCase() + status.slice(1),
                        stackgroup: 'one'
                    });
                });
            } else if (mode === 'tags') {
                const latestTags = data[data.length - 1].channels[channel].tags;
                const sortedTags = Object.entries(latestTags)
                    .sort((a, b) => b[1] - a[1])
                    .map(e => e[0]);
                
                const activeTags = forceTags || Array.from(tagFilters.querySelectorAll('input:checked')).map(cb => cb.value);
                if (activeTags.length === 0 && !forceTags) {
                    activeTags.push(...getTop10Tags(channel));
                }

                if (tagFilters.dataset.channel !== channel || forceTags) {
                    tagFilters.innerHTML = '';
                    tagFilters.dataset.channel = channel;
                    sortedTags.forEach(tag => {
                        const label = document.createElement('label');
                        label.className = 'inline-flex items-center px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 text-xs cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 border border-transparent dark:border-gray-600';
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.className = 'mr-1';
                        cb.value = tag;
                        cb.checked = activeTags.includes(tag);
                        cb.onchange = () => { updateChart(); updateUrl(); };
                        label.appendChild(cb);
                        label.appendChild(document.createTextNode(tag));
                        tagFilters.appendChild(label);
                    });
                }

                const selectedTags = Array.from(tagFilters.querySelectorAll('input:checked')).map(cb => cb.value);
                selectedTags.forEach(tag => {
                    traces.push({
                        x: dates,
                        y: data.map(d => (d.channels[channel].tags[tag] || 0)),
                        name: tag,
                        stackgroup: 'one'
                    });
                });
            }

            const layout = {
                title: {
                    text: (channel.charAt(0).toUpperCase() + channel.slice(1)) + ' Trends',
                    font: { 
                        size: 24, 
                        family: 'Inter, sans-serif', 
                        weight: '800',
                        color: dark ? '#f3f4f6' : '#111827'
                    }
                },
                hovermode: 'x unified',
                hoverlabel: {
                    bgcolor: dark ? '#1f2937' : '#ffffff',
                    font: { 
                        color: dark ? '#f3f4f6' : '#111827',
                        family: 'Inter, sans-serif'
                    },
                    bordercolor: dark ? '#4b5563' : '#e5e7eb'
                },
                xaxis: { 
                    title: 'Date', 
                    gridcolor: dark ? '#374151' : '#f3f4f6',
                    tickfont: { color: dark ? '#9ca3af' : '#4b5563' },
                    titlefont: { color: dark ? '#9ca3af' : '#4b5563' }
                },
                yaxis: { 
                    title: 'Count', 
                    gridcolor: dark ? '#374151' : '#f3f4f6',
                    tickfont: { color: dark ? '#9ca3af' : '#4b5563' },
                    titlefont: { color: dark ? '#9ca3af' : '#4b5563' }
                },
                legend: { 
                    orientation: 'h', 
                    y: -0.2,
                    font: { color: dark ? '#f3f4f6' : '#111827' }
                },
                margin: { t: 80, b: 100, l: 60, r: 20 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
            };

            Plotly.newPlot('chart', traces, layout, { responsive: true });
        }

        resetTagsBtn.onclick = () => {
            const channel = channelSelect.value;
            const top10 = getTop10Tags(channel);
            updateChart(top10);
            updateUrl();
        };

        channelSelect.onchange = () => { updateChart(); updateUrl(); };
        modeSelect.onchange = () => { updateChart(); updateUrl(); };
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => updateChart());

        async function init() {
            const response = await fetch('https://raw.githubusercontent.com/ZQuestClassic/discord-scripts/refs/heads/main/summary.json');
            data = await response.json();
            const initialTags = loadFromUrl();
            updateChart(initialTags);
        }
        init();
    </script>
</body>
</html>
